# 1. Launch instance
openstack server create \
  --flavor m1.medium \
  --image ubuntu-22.04 \
  --network private-net \
  --key-name my-keypair \
  --security-group default \
  my-instance


  # 2. Wait for ACTIVE state
openstack server show my-instance -c status

# 3. Allocate floating IP from external pool
openstack floating ip create external-network



# 4. Associate floating IP
openstack server add floating ip my-instance 203.0.113.10

# 5. Verify connectivity
ssh ubuntu@203.0.113.10


# 6. Create snapshot (stored as Glance image)
openstack server image create \
  --name my-instance-snapshot-$(date +%Y%m%d) \
  my-instance

# 7. Verify snapshot
openstack image list | grep my-instance-snapshot